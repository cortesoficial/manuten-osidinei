<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQUADRADRY - Gestão de Manutenção</title>
    <style>
        :root {
            --primary: #2c3e50; --accent: #3498db; --success: #27ae60;
            --admin: #8e44ad; --bg: #f4f7f6; --danger: #e74c3c;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 900px; margin: 20px auto; }
        
        h2, h3 { text-align: center; color: var(--primary); }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }

        /* Estilo dos Botões de Seleção */
        .grid-select { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .btn-opt { padding: 12px; cursor: pointer; border: 2px solid #ddd; background: white; border-radius: 6px; font-weight: 500; transition: 0.2s; text-align: center; }
        .btn-opt:hover { border-color: var(--accent); }
        .btn-opt.active { background: var(--accent); color: white; border-color: var(--accent); }
        
        /* Estilo específico para Peças (Verde quando selecionado) */
        .btn-peca.active { background: var(--success); border-color: var(--success); color: white; }

        .bloco { border: 2px solid #f0f0f0; padding: 20px; border-radius: 8px; background: #fafafa; margin-bottom: 15px; }
        
        .btn-save { background: var(--success); color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-logout { background: var(--danger); color: white; border: none; padding: 8px 15px; float: right; border-radius: 4px; cursor: pointer; }

        /* Tabela e Filtros */
        .filter-bar { display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; background: #eee; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: var(--primary); color: white; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="login-screen" class="container" style="max-width: 400px;">
        <h2>SQUADRADRY LOGIN</h2>
        <div class="input-group">
            <label>Usuário</label>
            <input type="text" id="user" placeholder="Usuário">
        </div>
        <div class="input-group">
            <label>Senha</label>
            <input type="password" id="pass" placeholder="Senha">
        </div>
        <button class="btn-save" onclick="login()">Acessar Sistema</button>
    </div>

    <!-- REGISTRO DE MANUTENÇÃO -->
    <div id="main-screen" class="container hidden">
        <button class="btn-logout" onclick="logout()">Sair</button>
        <h3>Registro de Manutenção</h3>
        
        <label>Selecione a Retífica:</label>
        <div class="grid-select">
            <div class="btn-opt opt-ret" onclick="selectSingle(this, 'ret')">Retífica 1</div>
            <div class="btn-opt opt-ret" onclick="selectSingle(this, 'ret')">Retífica 2</div>
        </div>

        <label>Selecione o Grupo:</label>
        <div class="grid-select">
            <div class="btn-opt opt-grp" onclick="selectSingle(this, 'grp')">Grupo 1</div>
            <div class="btn-opt opt-grp" onclick="selectSingle(this, 'grp')">Grupo 2</div>
        </div>

        <div class="bloco">
            <label>Peças Trocadas (Selecione todas que aplicar):</label>
            <div class="grid-select">
                <div class="btn-opt btn-peca" onclick="toggleMulti(this)">Disco</div>
                <div class="btn-opt btn-peca" onclick="toggleMulti(this)">Mancal</div>
                <div class="btn-opt btn-peca" onclick="toggleMulti(this)">Motor</div>
                <div class="btn-opt btn-peca" onclick="toggleMulti(this)">Acoplamento Motor</div>
                <div class="btn-opt btn-peca" onclick="toggleMulti(this)">Acoplamento Mancal</div>
            </div>

            <div class="input-group">
                <label>Número do Motor / Identificação</label>
                <input type="text" id="numMotor" placeholder="Digite o código da peça">
            </div>
        </div>

        <label>Responsável pelo Registro</label>
        <input type="text" id="responsavel" placeholder="Nome de quem realizou a troca" style="margin-bottom: 20px;">

        <button class="btn-save" onclick="salvar()">Salvar Registro de Manutenção</button>
    </div>

    <!-- ADMIN PANEL -->
    <div id="admin-panel" class="container hidden">
        <button class="btn-logout" onclick="logout()">Sair</button>
        <h3>Painel Administrativo</h3>

        <div class="filter-bar">
            <input type="text" id="filter-motor" placeholder="Busca por Motor" onkeyup="filtrar()">
            <input type="date" id="filter-data" onchange="filtrar()">
            <button onclick="limparFiltro()">Limpar Filtros</button>
        </div>

        <div style="overflow-x:auto;">
            <table>
                <thead>
                    <tr>
                        <th>Data/Hora</th>
                        <th>Equipamento</th>
                        <th>Peças Trocadas</th>
                        <th>ID Motor</th>
                        <th>Responsável</th>
                    </tr>
                </thead>
                <tbody id="tabela-corpo"></tbody>
            </table>
        </div>
    </div>

    <script>
        let logs = [];
        let curRet = "", curGrp = "";

        function login() {
            const u = document.getElementById('user').value;
            const s = document.getElementById('pass').value;

            if(u === "sergio" && s === "sergio") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                filtrar();
            } else if(u === "operador" && s === "123") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-screen').classList.remove('hidden');
            } else {
                alert("Acesso negado!");
            }
        }

        // Seleção única (Retífica e Grupo)
        function selectSingle(btn, tipo) {
            document.querySelectorAll('.opt-' + tipo).forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(tipo === 'ret') curRet = btn.innerText;
            if(tipo === 'grp') curGrp = btn.innerText;
        }

        // Seleção múltipla (Peças)
        function toggleMulti(btn) {
            btn.classList.toggle('active');
        }

        function salvar() {
            // Coleta todas as peças selecionadas
            const pecasSelecionadas = [];
            document.querySelectorAll('.btn-peca.active').forEach(btn => {
                pecasSelecionadas.push(btn.innerText);
            });

            if(!curRet || !curGrp || pecasSelecionadas.length === 0 || !document.getElementById('numMotor').value) {
                alert("Por favor, preencha todos os campos e selecione ao menos uma peça.");
                return;
            }

            const dataObj = new Date();
            const log = {
                data: dataObj.toISOString().split('T')[0],
                dataExibicao: dataObj.toLocaleString(),
                maquina: `${curRet} - ${curGrp}`,
                pecas: pecasSelecionadas.join(", "),
                motor: document.getElementById('numMotor').value,
                resp: document.getElementById('responsavel').value
            };

            logs.push(log);
            alert("Manutenção de múltiplas peças salva!");
            
            // Limpa campos
            document.querySelectorAll('.btn-opt').forEach(b => b.classList.remove('active'));
            document.getElementById('numMotor').value = "";
            curRet = ""; curGrp = "";
        }

        function filtrar() {
            const fMotor = document.getElementById('filter-motor').value.toLowerCase();
            const fData = document.getElementById('filter-data').value;
            const corpo = document.getElementById('tabela-corpo');
            corpo.innerHTML = "";

            logs.filter(l => {
                const matchMotor = l.motor.toLowerCase().includes(fMotor);
                const matchData = fData ? l.data === fData : true;
                return matchMotor && matchData;
            }).forEach(l => {
                corpo.innerHTML += `<tr>
                    <td>${l.dataExibicao}</td>
                    <td>${l.maquina}</td>
                    <td><b>${l.pecas}</b></td>
                    <td>${l.motor}</td>
                    <td>${l.resp}</td>
                </tr>`;
            });
        }

        function limparFiltro() {
            document.getElementById('filter-motor').value = "";
            document.getElementById('filter-data').value = "";
            filtrar();
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
