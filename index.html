<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQUADRADRY - Sistema Industrial</title>
    <style>
        :root {
            --primary: #2c3e50; --accent: #3498db; --success: #27ae60;
            --admin: #8e44ad; --bg: #f4f7f6; --danger: #e74c3c;
            --disabled: #bdc3c7;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 900px; margin: 10px auto; }
        
        h2, h3, h4 { text-align: center; color: var(--primary); margin-top: 10px; }
        .input-group { margin-bottom: 15px; width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }

        .grid-select { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .btn-opt { padding: 12px; cursor: pointer; border: 2px solid #ddd; background: white; border-radius: 6px; font-weight: 500; transition: 0.2s; text-align: center; font-size: 13px; }
        .btn-opt.active { background: var(--accent); color: white; border-color: var(--accent); }
        .btn-peca.active { background: var(--success); border-color: var(--success); color: white; }

        .bloco { border: 2px solid #f0f0f0; padding: 15px; border-radius: 8px; background: #fafafa; margin-bottom: 10px; }
        .label-bloco { font-weight: bold; display: block; margin-bottom: 10px; color: #555; font-size: 14px; }
        
        .btn-save { background: var(--success); color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .btn-logout { background: var(--danger); color: white; border: none; padding: 8px 15px; float: right; border-radius: 4px; cursor: pointer; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; background: white; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: var(--primary); color: white; }

        .hidden { display: none; }
        .nav-tabs { display: flex; gap: 5px; margin-bottom: 15px; justify-content: center; flex-wrap: wrap; }
        .tab-link { padding: 8px 12px; background: #ddd; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        .tab-link.active { background: var(--accent); color: white; }
    </style>
</head>
<body>

    <!-- TELA DE LOGIN -->
    <div id="login-screen" class="container" style="max-width: 400px;">
        <h2>SQUADRADRY LOGIN</h2>
        <input type="text" id="user" placeholder="Usuário" class="input-group">
        <input type="password" id="pass" placeholder="Senha" class="input-group">
        <button class="btn-save" onclick="login()">Acessar</button>
    </div>

    <!-- SISTEMA PRINCIPAL -->
    <div id="main-app" class="hidden">
        <div class="container">
            <button class="btn-logout" onclick="logout()">Sair</button>
            <div class="nav-tabs">
                <div class="tab-link active" onclick="showTab('corretiva')">Corretiva</div>
                <div class="tab-link" onclick="showTab('correias')">Correias</div>
                <div class="tab-link" onclick="showTab('empurrador')">Empurrador</div>
                <div class="tab-link" onclick="showTab('centralizador')">Centralizador</div>
                <div class="tab-link" onclick="showTab('admin')">Painel Admin</div>
            </div>

            <div id="maquina-selector" class="bloco">
                <label class="label-bloco">Localização da Manutenção:</label>
                <div class="grid-select">
                    <div class="btn-opt m-ret" onclick="sel(this, 'm-ret')">Retífica 1</div>
                    <div class="btn-opt m-ret" onclick="sel(this, 'm-ret')">Retífica 2</div>
                    <div class="btn-opt m-grp" onclick="sel(this, 'm-grp')">Grupo 1</div>
                    <div class="btn-opt m-grp" onclick="sel(this, 'm-grp')">Grupo 2</div>
                </div>
            </div>

            <!-- CONTEÚDO CORRETIVA -->
            <div id="aba-corretiva" class="tab-content">
                <h3>Manutenção Corretiva</h3>
                <div class="bloco">
                    <label class="label-bloco">Peças Trocadas:</label>
                    <div class="grid-select">
                        <div class="btn-opt btn-peca" onclick="this.classList.toggle('active')">Disco</div>
                        <div class="btn-opt btn-peca" onclick="this.classList.toggle('active')">Mancal</div>
                        <div class="btn-opt btn-peca" onclick="this.classList.toggle('active')">Motor</div>
                        <div class="btn-opt btn-peca" onclick="this.classList.toggle('active')">Acoplamento</div>
                    </div>
                    <input type="text" id="numMotor" placeholder="Número do Motor" class="input-group">
                </div>
                <button class="btn-save" onclick="salvar('Corretiva')">Salvar Registro</button>
            </div>

            <!-- PAINEL ADMIN -->
            <div id="aba-admin" class="tab-content hidden">
                <h3>Histórico de Registros</h3>
                <table id="tab-rel">
                    <thead><tr><th>Data</th><th>Aba</th><th>Máquina</th><th>Ações</th><th>Resp.</th></tr></thead>
                    <tbody id="corpo"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let users = JSON.parse(localStorage.getItem('users')) || [{u:'sergio', p:'sergio'}];
        let logs = JSON.parse(localStorage.getItem('logs')) || [];
        let r_sel = "", g_sel = "";

        window.onload = function() {
            if(localStorage.getItem('sessaoAtiva')) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                filtrar();
            }
        };

        function login() {
            const u = document.getElementById('user').value;
            const s = document.getElementById('pass').value;
            if(users.find(x => x.u === u && x.p === s)) {
                localStorage.setItem('sessaoAtiva', u);
                location.reload(); 
            } else { alert("Acesso negado."); }
        }

        function logout() {
            localStorage.removeItem('sessaoAtiva');
            location.reload();
        }

        function showTab(aba) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            if(document.getElementById('aba-'+aba)) document.getElementById('aba-'+aba).classList.remove('hidden');
            document.querySelectorAll('.tab-link').forEach(t => t.classList.toggle('active', t.innerText.toLowerCase().includes(aba)));
        }

        function sel(btn, cl) {
            document.querySelectorAll('.'+cl).forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(cl.includes('ret')) r_sel = btn.innerText; else g_sel = btn.innerText;
        }

        function salvar(abaNome) {
            if(!r_sel || !g_sel) return alert("Selecione a máquina.");
            const log = {
                data: new Date().toLocaleDateString('pt-BR'),
                aba: abaNome,
                maq: r_sel + " - " + g_sel,
                pecas: "Manutenção Realizada",
                res: localStorage.getItem('sessaoAtiva')
            };
            logs.push(log);
            localStorage.setItem('logs', JSON.stringify(logs));
            alert("Salvo com sucesso!");
            filtrar();
        }

        function filtrar() {
            const c = document.getElementById('corpo');
            c.innerHTML = "";
            logs.slice().reverse().forEach(l => {
                c.innerHTML += `<tr><td>${l.data}</td><td>${l.aba}</td><td>${l.maq}</td><td>${l.pecas}</td><td>${l.res}</td></tr>`;
            });
        }
    </script>
</body>
</html>
